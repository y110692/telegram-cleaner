name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-app.yml"
      - "build_windows_exe.ps1"
      - "build_macos_app.sh"
      - "fav_tinder_app/**"

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build Windows app
        shell: pwsh
        run: .\build_windows_exe.ps1

      - name: Archive Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path ".\dist\Разгребатель Телеги\*" `
            -DestinationPath ".\dist\Разгребатель Телеги-windows.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Разгребатель-Телеги-windows
          path: .\dist\Разгребатель Телеги-windows.zip
          if-no-files-found: error

  build-macos:
    name: macOS APP
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build macOS app
        run: |
          chmod +x ./build_macos_app.sh
          ./build_macos_app.sh

      - name: Archive macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "./dist/Разгребатель Телеги.app" \
            "./dist/Разгребатель Телеги-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Разгребатель-Телеги-macos
          path: ./dist/Разгребатель Телеги-macos.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Разгребатель-Телеги-windows
          path: ./release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Разгребатель-Телеги-macos
          path: ./release-assets/macos

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/windows/*.zip
            ./release-assets/macos/*.zip
          generate_release_notes: true
